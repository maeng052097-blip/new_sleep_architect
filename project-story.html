/* ============================================================
   Sleep Architect — Design Tokens (v1.4)
   Source: PLAN.md §10 Step 2 / IA.md / POLISH.md
   사용 원칙:
     1. 모든 색·간격·폰트·곡률은 본 파일의 변수만 사용
     2. 컴포넌트 내 매직 넘버 금지
     3. 다크 모드가 기본. 라이트 모드는 [data-theme="light"]에서 오버라이드
   업데이트 (v1.4 → POLISH 적용):
     ‧ 한글 줄바꿈 정책 — word-break: keep-all / text-wrap balance·pretty
     ‧ 커스텀 ::selection 색
     ‧ 커스텀 스크롤바 (트랙 — 썸 — hover 강조)
     ‧ 그레인 오버레이 토큰: 인라인 SVG turbulence, opacity 0.03
   ============================================================ */

:root {
  /* ─────────────── 색상: 베이스 (다크) ─────────────── */
  --color-bg:               #0A0E1A;  /* 페이지 배경 (deep night) */
  --color-surface:          #131829;  /* 카드 표면 */
  --color-surface-elevated: #1A2138;  /* 호버/포커스된 카드 */
  --color-border:           #232B45;  /* 분리선 */
  --color-border-strong:    #344063;  /* 강조 테두리 */

  /* ─────────────── 색상: 텍스트 ─────────────── */
  --color-text:             #F5F7FA;  /* 본문/제목 */
  --color-text-secondary:   #A0AEC0;  /* 보조 텍스트 */
  --color-text-muted:       #6B7B95;  /* 캡션, 라벨 */
  --color-text-on-accent:   #0A0E1A;  /* 액센트 배경 위 텍스트 */

  /* ─────────────── 색상: 액센트 (브랜드) ─────────────── */
  --color-accent:           #4FD1C5;  /* 신뢰/평온 — 1차 CTA */
  --color-accent-hover:     #5EEAD4;
  --color-accent-soft:      rgba(79, 209, 197, 0.12);

  /* ─────────────── 색상: 수면 단계 (도메인 컬러) ─────────────── */
  --color-stage-awake:      #FBBF24;  /* 깨어 있음 — amber */
  --color-stage-n1:         #93C5FD;  /* 얕은 수면 진입 — light blue */
  --color-stage-n2:         #60A5FA;  /* 얕은 수면 */
  --color-stage-n3:         #1E3A8A;  /* 깊은 수면 — deep blue */
  --color-stage-rem:        #8B5CF6;  /* REM — purple */

  /* ─────────────── 색상: 상태 ─────────────── */

  --color-warning:          #F59E0B;
  --color-danger:           #FF6B6B;

/* ============================================================

/* ============================================================
   v1.4 — 전역 정책 (Layer 1·5·6)
   ----
   이 규칙들은 토큰과 같은 계층에서 편집됩니다 — 컴포넌트
   CSS가 일부를 오버라이드하더라도 기본값이 여기서 출발합니다.
   ============================================================ */

/* 한글 줄바꿈 정책 */
html { word-break: keep-all; }
h1, h2, h3, h4, .h1, .h2, .h3 { text-wrap: balance; }
p, li, .sub, blockquote { text-wrap: pretty; }

/* 선택 색 — 액센트 soft 배경 + 본문 색 */
::selection {
  background: var(--color-accent-soft);
  color: var(--color-text);
}

/* 커스텀 스크롤바 (WebKit + Firefox) */
html {
  scrollbar-color: var(--color-border-strong) var(--color-bg);
  scrollbar-width: thin;
}
*::-webkit-scrollbar      { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: var(--color-bg); }
*::-webkit-scrollbar-thumb {
  background: var(--color-border-strong);
  border: 2px solid var(--color-bg);
  border-radius: var(--radius-full);
  transition: background var(--dur-fast) var(--ease-smooth);
}
*::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

/* ============================================================
   접근성 — 모션 감소 사용자
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  :root {
    --dur-fast:  0ms; /* @kind other */
    --dur-base:  0ms; /* @kind other */
    --dur-slow:  0ms; /* @kind other */
    --dur-story: 0ms; /* @kind other */
  }
}

     wide:    1440+
   ============================================================ */

/* ============================================================
   Sleep Architect — Hero (Punchi-Kun Edition)

   Architecture mirrors Punchi-Kun:
     - 1440 × 1080 design canvas, transform: scale() to fit viewport
     - 5 stage scenes stacked (only one visible per step, fade-cross)
     - Oval orbital nav anchored bottom-center
     - SplitText title + gradient last word
   All colors reference tokens.css. Bruno Ace = brand wordmark + nav labels.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100%;
}
ul, ol { list-style: none; }
img, svg { display: block; max-width: 100%; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }
:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 4px;
  border-radius: var(--radius-xs);
}

/* Skip link */
.sa-pk-skip {
  position: absolute;
  top: -100px; left: var(--space-4);
  z-index: 9999;
  padding: var(--space-3) var(--space-5);
  background: var(--color-text);
  color: var(--color-bg);
  border-radius: var(--radius-md);
  font: var(--fw-semibold) var(--fs-body-sm) 'Bruno Ace', var(--font-sans);
  letter-spacing: var(--ls-wide);
  transition: top var(--dur-base) var(--ease-smooth);
}
.sa-pk-skip:focus { top: var(--space-4); }

/* ───────── Stage (viewport-fit scaler) ───────── */
.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: var(--color-bg);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stage__canvas {
  position: absolute;
  width: 1440px;
  height: 1080px;
  transform-origin: top left;
  z-index: 2;          /* UI sits above the full-bleed scene + aurora */
  /* transform: scale(s); top/left set inline */
}

/* Full-bleed scene background — fills the whole viewport edge-to-edge so there
   is no letterbox seam line beside the scaled UI. Scenes cover via slice. */
.hero-scene-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.hero-scene-bg .scene-stack { position: absolute; inset: 0; }

/* ───────── Scene container (1 active at a time) ───────── */
.scene {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-slow) var(--ease-smooth);
}
.scene.is-active { opacity: 1; pointer-events: auto; }

/* Each scene exposes its dominant color via --stage-color */
.scene[data-stage="awake"] { --stage-color: var(--color-stage-awake); --stage-glow: rgba(251, 191, 36, 0.55); }
.scene[data-stage="n1"]    { --stage-color: var(--color-stage-n1);    --stage-glow: rgba(147, 197, 253, 0.55); }
.scene[data-stage="n2"]    { --stage-color: var(--color-stage-n2);    --stage-glow: rgba(96, 165, 250, 0.55); }
.scene[data-stage="n3"]    { --stage-color: var(--color-stage-n3);    --stage-glow: rgba(30, 58, 138, 0.65); }
.scene[data-stage="rem"]   { --stage-color: var(--color-stage-rem);   --stage-glow: rgba(139, 92, 246, 0.55); }

/* SVG scene fills full 1440×1080 */
.scene__svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Drop-shadow per paper layer */
.paper {
  filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.35));
}
.paper--deep {
  filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.5));
}

/* Star field on REM/N3 scenes */
.scene__stars circle { fill: var(--color-text); }

/* User image slot per scene (covers the entire scene) */
.scene__slot {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ───────── Color flow blob (the giant blurred ellipse behind everything) ───────── */
.flow-blob {
  position: absolute;
  left: 50%;
  top: 60%;
  transform: translate(-50%, -50%);
  width: 1500px;
  height: 1200px;
  pointer-events: none;
  z-index: 0;
  transition: background var(--dur-story) var(--ease-smooth);
  filter: blur(150px);
  opacity: 0.48;
  border-radius: 50%;
  background: var(--stage-color, var(--color-accent));
}

/* ───────── Title block ───────── */
.hero-title {
  position: absolute;
  left: 50%;
  top: 42%;
  transform: translate(-50%, -50%);
  width: 1100px;
  max-width: calc(100% - 80px);
  text-align: center;
  z-index: 30;
  color: var(--color-text);
  pointer-events: none;
}
.hero-title__main {
  font: var(--fw-bold) 80px/1.05 'Bruno Ace', var(--font-sans);
  letter-spacing: -0.01em;
  text-wrap: balance;
}
.hero-title__sub {
  margin-top: var(--space-6);
  font: var(--fw-medium) 44px/1.15 'Bruno Ace', var(--font-sans);
  letter-spacing: -0.01em;
  text-wrap: balance;
  opacity: 0.92;
}
.hero-title__korean {
  margin-top: var(--space-8);
  font: var(--fw-medium) 22px/1.45 var(--font-sans);
  color: rgba(255, 255, 255, 0.78);
  word-break: keep-all;
  text-wrap: pretty;
}

/* Gradient last word (solid stage-color — gradient breaks when nested chars
   have opacity/transform set by JS, because background-clip:text doesn't
   composite cleanly through child stacking contexts) */
.hero-title .accent-word {
  color: var(--stage-color, #C3F3D8);
  display: inline-block;
  text-shadow: 0 0 18px var(--stage-glow, rgba(195, 243, 216, 0.45));
}
/* Children inherit so each animated split-char keeps the stage color */
.hero-title .accent-word .split-char,
.hero-title .accent-word .split-space {
  color: inherit;
}

/* SplitText character entry */
.split-char {
  display: inline-block;
  opacity: 0;
  transform: translateY(0.45em);
  will-change: transform, opacity;
}
.split-space { display: inline-block; width: 0.32em; }
.split-line  { display: block; }

/* ───────── Brand wordmark ───────── */
.wordmark {
  position: absolute;
  left: 50%;
  top: 80px;
  transform: translateX(-50%);
  font: var(--fw-regular) 32px/1 'Bruno Ace', var(--font-sans);
  letter-spacing: 0.34em;
  color: var(--color-text);
  z-index: 40;
  white-space: nowrap;
}

/* ───────── Top-right meta (env stats) ───────── */
.meta {
  position: absolute;
  right: 64px;
  top: 80px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: var(--space-2);
  font: var(--fw-medium) 14px/1 var(--font-mono);
  letter-spacing: var(--ls-wide);
  color: rgba(255, 255, 255, 0.7);
  z-index: 40;
  text-transform: uppercase;
  font-variant-numeric: tabular-nums;
}
.meta__row { display: flex; align-items: center; gap: var(--space-2); }
.meta__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--stage-color, var(--color-accent));
  box-shadow: 0 0 12px var(--stage-glow);
}

/* ───────── Bottom-left timer hint ───────── */
.hint {
  position: absolute;
  left: 64px;
  bottom: 80px;
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font: var(--fw-medium) 12px/1 var(--font-mono);
  letter-spacing: var(--ls-wide);
  color: rgba(255, 255, 255, 0.55);
  z-index: 40;
  text-transform: uppercase;
}
.hint__bar {
  width: 56px;
  height: 1px;
  background: rgba(255, 255, 255, 0.18);
  position: relative;
  overflow: hidden;
}
.hint__bar::before {
  content: "";
  position: absolute;
  inset: 0;
  width: var(--progress, 0%);
  background: var(--color-text);
  transition: width 100ms linear;
}
/* Hint as a real play/pause toggle button (WCAG 2.2.2) */
.hint--toggle {
  background: none;
  border: 0;
  cursor: pointer;
  border-radius: var(--radius-md);
  padding: 6px 8px;
  margin: -6px -8px;
  transition: color var(--dur-fast) var(--ease-smooth);

/* ════════════════════════════════════════════
   CTA
   ════════════════════════════════════════════ */

  position: relative;

    radial-gradient(70% 80% at 50% 50%, rgba(139,92,246,0.14), transparent 70%),

  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(79,209,197,0.18), rgba(139,92,246,0.10) 45%, transparent 72%);
  filter: blur(40px);
  pointer-events: none;
  animation: cta-bloom 7s var(--ease-smooth) infinite alternate;
}
/* Sweeping light rays behind the headline, revealed when in view */
.cta__rays {
  position: absolute; left: 50%; top: 42%; transform: translate(-50%,-50%) scale(0.6);
  width: 1200px; height: 1200px;
  pointer-events: none; opacity: 0;
  background: conic-gradient(from 0deg, transparent 0deg, rgba(79,209,197,0.06) 12deg, transparent 24deg, transparent 60deg, rgba(139,92,246,0.05) 72deg, transparent 84deg, transparent 180deg, rgba(79,209,197,0.05) 192deg, transparent 204deg, transparent 300deg, rgba(139,92,246,0.04) 312deg, transparent 324deg);

          mask: radial-gradient(circle, #000 0%, transparent 62%);
  transition: opacity 1200ms var(--ease-out) 200ms, transform 1400ms var(--ease-out) 200ms;
}

@keyframes cta-rays-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { .cta__rays { animation: none !important; } }
@keyframes cta-bloom { from { transform: translate(-50%,-50%) scale(0.94); opacity: 0.8; } to { transform: translate(-50%,-50%) scale(1.08); opacity: 1; } }
@media (prefers-reduced-motion: reduce) { .cta__bloom { animation: none; } }
.cta__wrap { position: relative; z-index: 1; }
.cta__eyebrow {
  font: var(--fw-semibold) var(--fs-caption)/1 'Bruno Ace', var(--font-mono);
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-accent);
  margin-bottom: var(--space-5);
}
.cta__title {
  font: 800 clamp(40px, 7vw, 96px)/1.08 var(--font-sans);
  letter-spacing: -0.03em;
  color: var(--color-text);
  text-wrap: balance;
  word-break: keep-all;
}
.cta__line { display: block; opacity: 0; transform: translateY(40px); filter: blur(8px); transition: opacity 700ms var(--ease-out), transform 800ms var(--ease-out), filter 700ms var(--ease-out); }
.cta__line--2 { transition-delay: 180ms; }

.cta__big { font-variant-numeric: tabular-nums; display: inline-block; }
/* '8시간' starts large and recedes slightly as the eye lands on '1분' */
.cta__big--from { color: var(--color-text-muted); transition: color 600ms var(--ease-smooth) 500ms; }

  transform: scale(0.5);
  opacity: 0;
  transition: transform 720ms var(--ease-spring) 560ms, opacity 500ms var(--ease-out) 560ms;
}
.cta.is-in .cta__big--accent { transform: scale(1); opacity: 1; animation: cta-num-pulse 2.6s var(--ease-smooth) 1.4s infinite; }
@keyframes cta-num-pulse { 0%,100% { text-shadow: 0 0 28px rgba(79,209,197,0.45); } 50% { text-shadow: 0 0 46px rgba(79,209,197,0.8); } }
@media (prefers-reduced-motion: reduce) {
  .cta__line, .cta__big--from, .cta__big--accent { opacity: 1 !important; transform: none !important; filter: none !important; transition: none !important; animation: none !important; }
}
.cta__sub {
  margin-top: var(--space-6);
  font-size: clamp(16px, 1.6vw, 20px);
  color: var(--color-text-secondary);
  line-height: var(--lh-relaxed);

}

  justify-content: center;
  flex-wrap: wrap;

}

.cta.is-in .cta__eyebrow { opacity: 1; transform: translateY(0); }
.cta__sub { opacity: 0; transform: translateY(16px); transition: opacity 600ms var(--ease-out) 640ms, transform 600ms var(--ease-out) 640ms; }

@media (prefers-reduced-motion: reduce) {
  .cta__btns, .cta__eyebrow, .cta__sub { opacity: 1 !important; transform: none !important; transition: none !important; }
}
.cta__btn {
  display: inline-flex;
  align-items: center;

  <script type="text/babel" data-from="engine.jsx">
/* eslint-disable */
/* sa-pk/engine.jsx — Viewport scaler, step state, auto-advance, drag, keyboard */

const { useState, useEffect, useRef, useCallback, useMemo, useLayoutEffect } = React;

const BASE_W = 1440;
const BASE_H = 1080;
const STAGE_COUNT = 5;

/* prefers-reduced-motion */
const usePrefersReducedMotion = () => {
  const [reduced, setReduced] = useState(
    () => typeof matchMedia !== 'undefined' && matchMedia('(prefers-reduced-motion: reduce)').matches
  );
  useEffect(() => {
    if (typeof matchMedia === 'undefined') return;
    const mq = matchMedia('(prefers-reduced-motion: reduce)');
    const on = (e) => setReduced(e.matches);
    mq.addEventListener?.('change', on);
    return () => mq.removeEventListener?.('change', on);
  }, []);
  return reduced;
};

/* Responsive viewport scale — 1440×1080 canvas scaled to fit, centered.
   Desktop uses 'contain' (letterbox), tablet/mobile use 'cover' (crop). */
const useViewportScale = () => {
  const getLayout = useCallback(() => {
    if (typeof window === 'undefined') {
      return { s: 1, cW: BASE_W, cH: BASE_H, vw: BASE_W, vh: BASE_H, isMobile: false, isTablet: false, isDesktop: true };
    }
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const isMobile = vw <= 768;
    const isTablet = vw > 768 && vw <= 1024;
    const isDesktop = vw > 1024;
    const s = isDesktop ? Math.min(vw / BASE_W, vh / BASE_H) : Math.max(vw / BASE_W, vh / BASE_H);
    return { s, cW: BASE_W * s, cH: BASE_H * s, vw, vh, isMobile, isTablet, isDesktop };
  }, []);
  const [layout, setLayout] = useState(getLayout);
  useEffect(() => {
    let raf = 0;
    const onResize = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => setLayout(getLayout()));
    };
    setLayout(getLayout());
    window.addEventListener('resize', onResize);
    return () => {
      window.removeEventListener('resize', onResize);
      cancelAnimationFrame(raf);
    };
  }, [getLayout]);
  return layout;
};

/* Step state + auto-advance + pause-on-hover + safety unpause */
const STEP_STORAGE_KEY = 'sa-pk-step';
const useStepEngine = ({ autoAdvanceMs, paused, setPaused }) => {
  const [step, setStep] = useState(() => {
    if (typeof window === 'undefined') return 1;
    const stored = parseInt(localStorage.getItem(STEP_STORAGE_KEY) || '1', 10);
    return Math.min(Math.max(1, stored), STAGE_COUNT) || 1;
  });
  // Persist step across reloads (also enables external test harnesses to seed state)
  useEffect(() => {
    try { localStorage.setItem(STEP_STORAGE_KEY, String(step)); } catch (e) {}
  }, [step]);
  const [progress, setProgress] = useState(0);
  const reduced = usePrefersReducedMotion();

  const goNext = useCallback(() => setStep((p) => (p < STAGE_COUNT ? p + 1 : 1)), []);
  const goPrev = useCallback(() => setStep((p) => (p > 1 ? p - 1 : STAGE_COUNT)), []);
  const goTo   = useCallback((n) => setStep(Math.min(Math.max(1, n), STAGE_COUNT)), []);

  // Auto-advance + progress bar
  useEffect(() => {
    if (paused) return;
    if (reduced) return; // honor reduced motion — no auto cycle
    let raf = 0;
    let t0 = performance.now();
    const tick = (now) => {
      const k = Math.min(1, (now - t0) / autoAdvanceMs);
      setProgress(k);
      if (k >= 1) {
        goNext();
        t0 = performance.now();
        setProgress(0);
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [paused, reduced, autoAdvanceMs, goNext, step]);

  // Reset progress on manual step change
  useEffect(() => { setProgress(0); }, [step]);

  // Keyboard navigation (desktop)
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goNext(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goPrev(); }
      else if (e.key >= '1' && e.key <= '5') { e.preventDefault(); goTo(parseInt(e.key, 10)); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [goNext, goPrev, goTo]);

  // Safety: if paused for >10s, force unpause (mirrors Punchi-Kun)
  const lastPauseRef = useRef(Date.now());
  useEffect(() => {
    if (paused) lastPauseRef.current = Date.now();
    if (!paused) return;
    const t = setTimeout(() => {
      if (paused && Date.now() - lastPauseRef.current > 10000) setPaused(false);
    }, 10000);
    return () => clearTimeout(t);
  }, [paused, setPaused]);

  return { step, progress, goNext, goPrev, goTo };
};

/* Drag-to-swipe horizontal — pointer events on the canvas */
const useSwipe = (onLeft, onRight, threshold = 60) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let startX = 0, dragging = false;
    const onDown = (e) => {
      // Only respond to primary button / single touch
      if (e.button !== undefined && e.button !== 0) return;
      dragging = true;
      startX = (e.touches?.[0]?.clientX ?? e.clientX) || 0;
    };
    const onMove = (e) => {
      if (!dragging) return;
      // prevent text selection while dragging
    };
    const onUp = (e) => {
      if (!dragging) return;
      dragging = false;
      const endX = (e.changedTouches?.[0]?.clientX ?? e.clientX) || 0;
      const dx = endX - startX;
      if (dx > threshold) onRight?.();
      else if (dx < -threshold) onLeft?.();
    };
    el.addEventListener('pointerdown', onDown);
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
    el.addEventListener('pointercancel', onUp);
    return () => {
      el.removeEventListener('pointerdown', onDown);
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      el.removeEventListener('pointercancel', onUp);
    };
  }, [onLeft, onRight, threshold]);
  return ref;
};

/* Stage definitions — single source of truth for all 5 scenes */
const STAGES = [
  {
    id: 'awake', num: '01', short: 'Awake',
    title: 'The day fades.',
    sub:   ['Lights ', 'dim.'],
    korean: '체온이 0.3℃ 내려가고, 조명이 따뜻한 호박빛으로 가라앉습니다.',
    meta: { temp: '24.0°C', humi: '52%', lux: '180 LX', noise: '38 DB' },
  },
  {
    id: 'n1', num: '02', short: 'Drift',
    title: 'Drifting in.',
    sub:   ['Muscles ', 'soften.'],
    korean: '근육이 풀리고 호흡이 느려집니다. 입면까지 평균 9분.',
    meta: { temp: '22.4°C', humi: '54%', lux: '12 LX', noise: '32 DB' },
  },
  {
    id: 'n2', num: '03', short: 'Sink',
    title: 'Going deeper.',
    sub:   ['Spindles ', 'appear.'],
    korean: '수면 방추파가 나타나고, 체온이 가장 빠르게 떨어집니다.',
    meta: { temp: '21.8°C', humi: '55%', lux: '0 LX', noise: '28 DB' },
  },
  {
    id: 'n3', num: '04', short: 'Still',
    title: 'Stillness.',
    sub:   ['Body ', 'restores.'],
    korean: '깊은 수면. 성장호르몬이 분비되고 면역이 회복됩니다.',
    meta: { temp: '21.2°C', humi: '55%', lux: '0 LX', noise: '24 DB' },
  },
  {
    id: 'rem', num: '05', short: 'Dream',
    title: 'Dreaming.',
    sub:   ['Memory ', 'reorders.'],
    korean: 'REM 단계. 안구가 움직이고 기억이 정리됩니다.',
    meta: { temp: '21.6°C', humi: '54%', lux: '0 LX', noise: '26 DB' },
  },
];

/* Oval orbit positions — 5 nodes around an ellipse, currentStep at apex.
   Mirrors Punchi-Kun's "wheel" rotation: positions array rotates by currentStep. */
const ORBIT_POSITIONS = [
  { x: 0,    y: 8   },  // top (current)
  { x: 201,  y: 55  },  // top-right
  { x: 300,  y: 202 },  // bottom-right
  { x: -300, y: 202 },  // bottom-left
  { x: -197, y: 55  },  // top-left
];

const positionForOrbit = (slotIdx, currentStep) => {
  // slotIdx is 0..4 (a stage's home slot)
  // We want stage = currentStep-1 to sit at index 0 (top)
  const rotated = ((slotIdx - (currentStep - 1)) + STAGE_COUNT) % STAGE_COUNT;
  return ORBIT_POSITIONS[rotated];
};

/* Export to window */
Object.assign(window, {
  BASE_W, BASE_H, STAGE_COUNT, STAGES, ORBIT_POSITIONS, positionForOrbit,
  useViewportScale, useStepEngine, useSwipe, usePrefersReducedMotion,
});

</script>
  <script type="text/babel" data-from="page-backdrop.jsx">
/* eslint-disable */
/* sa-pk/page-backdrop.jsx — One continuous night sky behind the WHOLE page.
   Fixed, full-viewport, z-index -2 (below the aurora at -1). It carries the same
   stars + soft nebula the hero scenes use, so scrolling from the hero into the
   narrative never hits a "flat dark" wall — the sky is the through-line.

   Pure SVG, deterministic, no per-frame work (one slow CSS twinkle only). */

const BackdropStars = ({ count, seed, rMax = 1.7, opacityMin = 0.25 }) => {
  const stars = useMemo(() => {
    const out = [];
    let s = seed * 9301 + 49297;
    const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    for (let i = 0; i < count; i++) {
      out.push({
        x: +(r() * 100).toFixed(2),
        y: +(r() * 100).toFixed(2),
        rad: +(0.4 + r() * rMax).toFixed(2),
        op: +(opacityMin + r() * (1 - opacityMin)).toFixed(2),
        tw: +(2.5 + r() * 4).toFixed(2),
        delay: +(r() * 4).toFixed(2),
      });
    }
    return out;
  }, [count, seed, rMax, opacityMin]);
  return (
    <>
      {stars.map((st, i) => (
        <circle
          key={i}
          cx={`${st.x}%`} cy={`${st.y}%`} r={st.rad}
          fill="#F5F7FA" opacity={st.op}
          style={{ animation: `bd-twinkle ${st.tw}s var(--ease-smooth) ${st.delay}s infinite` }}
        />
      ))}
    </>
  );
};

const PageBackdrop = () => {
  const reduced = usePrefersReducedMotion();
  return (
    <React.Fragment>
      <div className="page-backdrop" aria-hidden="true">
        {/* Nebula blooms behind everything */}
        <div className="page-backdrop__nebula" />
        <div className="page-backdrop__vignette" />
      </div>
      {/* Stars + shooting stars, always rendered. The opaque hero scene covers
          them on screen 1; transparent sections reveal them from screen 2 on. */}
      <div className="starfield" aria-hidden="true">
        <svg className="page-backdrop__stars page-backdrop__stars--a" preserveAspectRatio="none">
          <BackdropStars count={reduced ? 90 : 170} seed={7} rMax={2.2} opacityMin={0.5} />
        </svg>
        <svg className="page-backdrop__stars page-backdrop__stars--b" preserveAspectRatio="none">
          <BackdropStars count={reduced ? 30 : 70} seed={13} rMax={1.3} opacityMin={0.32} />
        </svg>
        {!reduced && (
          <div className="page-backdrop__shooting">
            <span className="shoot shoot--1" />
            <span className="shoot shoot--2" />
          </div>
        )}
      </div>
    </React.Fragment>
  );
};

Object.assign(window, { PageBackdrop, BackdropStars });

</script>
  <script type="text/babel" data-from="reveal.jsx">
/* eslint-disable */
/* sa-pk/reveal.jsx — Scroll-reveal helpers for the long-scroll narrative.
   - useReveal: fires once when an element enters view (drives fade-up).
   - useScrollProgress: 0→1 as a tall section scrolls through the viewport,
     used by the sticky product-reveal section to stage callouts one by one.
   - Reveal: wrapper that applies a staggered fade-up to its children. */

/* In-view detector — bidirectional, scroll-driven (deterministic across
   browsers/harnesses): true while the element's top band is in the viewport,
   false once it leaves. Reveals on scroll-down, un-reveals on scroll-up. */
const useReveal = (opts = {}) => {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  const reduced = usePrefersReducedMotion();
  useEffect(() => {
    if (!ref.current) return;
    if (reduced) { setSeen(true); return; }
    let raf = 0;
    const check = () => {
      const el = ref.current; if (!el) return;
      const vh = window.innerHeight || 800;
      const r = el.getBoundingClientRect();
      setSeen(r.top < vh * 0.9 && r.bottom > vh * 0.04);
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(check); };
    check();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); cancelAnimationFrame(raf); };
  }, [reduced]);
  return [ref, seen];
};

/* 0→1 progress as a tall element scrolls from entering to leaving the viewport.
   progress 0 = element top hits viewport bottom; 1 = element bottom hits viewport top.
   We clamp to the "pinned" window so the sticky child gets a clean 0..1. */
const useScrollProgress = (ref) => {
  const [p, setP] = useState(0);
  const reduced = usePrefersReducedMotion();
  useEffect(() => {
    if (!ref.current) return;
    let raf = 0;
    const onScroll = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const el = ref.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        const vh = window.innerHeight || 800;
        // total scrollable distance for this section = its height - one viewport
        const total = r.height - vh;
        const scrolled = -r.top;
        const k = total > 0 ? Math.min(1, Math.max(0, scrolled / total)) : (r.top < vh * 0.5 ? 1 : 0);
        setP(k);
      });
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
      cancelAnimationFrame(raf);
    };
  }, []);
  // reduced motion → treat as fully revealed once mounted near view
  return reduced ? 1 : p;
};

/* Staggered fade-up wrapper. Children get sequential delays once revealed. */
const Reveal = ({ children, as: As = 'div', className = '', stagger = 90, threshold, ...rest }) => {
  const [ref, seen] = useReveal({ threshold });
  return (
    <As ref={ref} className={`reveal ${seen ? 'is-in' : ''} ${className}`} {...rest}>
      {React.Children.map(children, (child, i) =>
        React.isValidElement(child)
          ? React.cloneElement(child, {
              style: { ...(child.props.style || {}), '--reveal-delay': `${i * stagger}ms` },
              className: `reveal__item ${child.props.className || ''}`,
            })
          : child
      )}
    </As>
  );
};

Object.assign(window, { useReveal, useScrollProgress, Reveal });

/* ScrubVideo — a <video> whose currentTime is driven by a 0..1 `progress`.
   Gives true scroll-scrubbed motion: scroll down → video plays forward, up →
   reverse. Muted/inline so it can be seeked freely.
   When `chroma` is set, each frame is drawn to a <canvas> with near-white pixels
   knocked out to transparent — so a white-background clip floats on the dark page
   with no white box (option-1 transparent look, done at runtime). */
const ScrubVideo = ({ src, poster, progress, className = '', alt = '', chroma = false }) => {
  const ref = useRef(null);
  const canvasRef = useRef(null);
  const [blobUrl, setBlobUrl] = useState(null);
  const [ready, setReady] = useState(false);
  const [failed, setFailed] = useState(false);
  const durRef = useRef(0);
  const reduced = usePrefersReducedMotion();

  // Fetch the file as a blob URL — blob: sources are fully seekable, fixing
  // MP4s whose currentTime won't move (seekable range empty) when loaded via
  // a plain relative URL without range support.
  useEffect(() => {
    let revoked = null;
    let alive = true;
    fetch(src)
      .then((r) => r.blob())
      .then((b) => {
        if (!alive) return;
        const url = URL.createObjectURL(b);
        revoked = url;
        setBlobUrl(url);
      })
      .catch(() => { if (alive) setBlobUrl(src); }); // fall back to direct src
    return () => { alive = false; if (revoked) URL.revokeObjectURL(revoked); };
  }, [src]);

  useEffect(() => {
    const v = ref.current;
    if (!v || !blobUrl) return;
    const onMeta = () => {
      durRef.current = v.duration || 0;
      // size the keying canvas to the video (capped for perf)
      if (canvasRef.current && v.videoWidth) {
        const cap = 760;
        const scale = Math.min(1, cap / v.videoWidth);
        canvasRef.current.width = Math.round(v.videoWidth * scale);
        canvasRef.current.height = Math.round(v.videoHeight * scale);
      }
      setReady(true);
    };
    const onErr = () => setFailed(true);
    v.addEventListener('loadedmetadata', onMeta);
    v.addEventListener('error', onErr);
    v.load();
    // Fallback: if the browser can't decode this codec within 6s, show poster.
    const t = setTimeout(() => { if (!v.videoWidth) setFailed(true); }, 6000);
    return () => {
      v.removeEventListener('loadedmetadata', onMeta);
      v.removeEventListener('error', onErr);
      clearTimeout(t);
    };
  }, [blobUrl]);

  // Continuously ease the video's currentTime toward the scroll target via rAF,
  // and (when chroma) draw the current frame to the canvas with white knocked out.
  const targetRef = useRef(0);
  useEffect(() => { targetRef.current = Math.max(0, Math.min(1, progress)); }, [progress]);

  useEffect(() => {
    if (!ready || !durRef.current) return;
    const v = ref.current;
    const cv = canvasRef.current;
    if (!v) return;
    const ctx = chroma && cv ? cv.getContext('2d', { willReadFrequently: true }) : null;
    let raf = 0;
    const dur = durRef.current - 0.05;
    const FPS = 30;
    let displayed = v.currentTime;
    let lastDrawn = -1;

    const keyFrame = () => {
      if (!ctx) return;
      // Lazily size the canvas to the video the first time we have dimensions.
      if (cv.width < 100 && v.videoWidth) {
        const cap = 760;
        const scale = Math.min(1, cap / v.videoWidth);
        cv.width = Math.round(v.videoWidth * scale);
        cv.height = Math.round(v.videoHeight * scale);
      }
      const w = cv.width, h = cv.height;
      if (w < 100) return;
      try { ctx.drawImage(v, 0, 0, w, h); } catch (e) { return; }
      let img;
      try { img = ctx.getImageData(0, 0, w, h); } catch (e) { return; }
      const d = img.data;
      // Knock out near-white, low-saturation pixels (the studio backdrop).
      // Robot keeps its shape: colored accents are saturated, the face is dark,
      // and the cream body stays because we only fully cut pixels above ~248.
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        const mx = r > g ? (r > b ? r : b) : (g > b ? g : b);
        const mn = r < g ? (r < b ? r : b) : (g < b ? g : b);
        const sat = mx - mn;
        const warm = r - b;           // beige backdrop is warm: R > B
        // Background = warm, mid-bright, low-saturation beige. The robot's dark
        // face (low mx), teal accents (b≥r → warm≤0) and neutral highlights
        // (warm≈0) all survive; only the beige studio sweep is cut.
        if (mx > 95 && warm >= 16 && sat < 64) {
          // ramp alpha by how strongly "beige" the pixel is
          const a = Math.max(0, Math.min(255, (40 - warm) * 12));
          d[i + 3] = a;
        }
      }
      ctx.putImageData(img, 0, 0);
    };

    const tick = () => {
      if (!reduced) {
        const targetT = targetRef.current * dur;
        const gap = targetT - displayed;
        const absGap = Math.abs(gap);
        // Large jump (fast scroll): snap straight to target so we never lag.
        // Small gap: ease for smoothness.
        if (absGap > 0.4) {
          displayed = targetT;
        } else {
          const k = 0.12 + Math.min(0.18, absGap * 0.08);
          displayed += gap * k;
        }
        const quantized = Math.round(displayed * FPS) / FPS;
        // Only request a new seek when the decoder is idle — issuing a seek
        // while v.seeking is true gets dropped by the browser and freezes the
        // frame on fast scrubs.
        if (!v.seeking && Math.abs(v.currentTime - quantized) >= 1 / FPS) {
          try { v.currentTime = quantized; } catch (e) {}
        }
      }
      // redraw the keyed frame whenever the shown time changed
      if (ctx && Math.abs(v.currentTime - lastDrawn) >= 0.5 / FPS) {
        keyFrame();
        lastDrawn = v.currentTime;
      }
      raf = requestAnimationFrame(tick);
    };
    // draw once the first frame is decodable
    const onSeeked = () => keyFrame();
    v.addEventListener('seeked', onSeeked);
    v.addEventListener('loadeddata', onSeeked);
    raf = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(raf);
      v.removeEventListener('seeked', onSeeked);
      v.removeEventListener('loadeddata', onSeeked);
    };
  }, [ready, reduced, chroma]);

  if (chroma) {
    return (
      <span className="scrubv">
        {!failed && (
          <video
            ref={ref}
            src={blobUrl || undefined}
            muted playsInline preload="auto" tabIndex={-1}
            className="scrubv__video"
            aria-hidden="true"
          />
        )}
        {failed
          ? <img src={poster} className={`scrubv__canvas ${className}`} alt={alt} />
          : <canvas ref={canvasRef} className={`scrubv__canvas ${className}`} role="img" aria-label={alt} />
        }
      </span>
    );
  }

  return (
    <video
      ref={ref}
      className={className}
      src={blobUrl || undefined}
      poster={poster}
      muted
      playsInline
      preload="auto"
      aria-label={alt}
      tabIndex={-1}
    />
  );
};

Object.assign(window, { ScrubVideo });

</script>
